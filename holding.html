<!doctype html>
<html lang="en">
<head>

  <link rel="stylesheet" href="styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    .holding-main{display:flex;align-items:center;justify-content:center;min-height:70vh;padding:3rem}
    .holding-card{text-align:center;max-width:720px}

    .holding-card img{
      width:320px;
      height:320px;
      max-width:48vw;
      max-height:48vw;
      object-fit:cover;
      border-radius:50%;
      border:4px solid var(--labour-red);

      margin:0 auto;
    }
    @media (max-width:600px){
      .holding-card img{width:220px;height:220px;max-width:60vw;max-height:60vw}
    }

    /* Center and space social icons */
    .social-links{display:flex;justify-content:center;align-items:center;gap:1rem;margin-top:1rem}
    .social-links a{margin:0;color:inherit}

<body>
  <div class="page-background">

        <img src="images/alex-brooks-crofton-park.webp" alt="Alex Brooks">

        <div class="social-links" aria-label="Social links">
          <a href="https://facebook.com/LabourBrooks" target="_blank" rel="noopener noreferrer" aria-label="Facebook"><i class="fab fa-facebook fa-2x"></i></a>
          <a href="https://instagram.com/LabourBrooks" target="_blank" rel="noopener noreferrer" aria-label="Instagram"><i class="fab fa-instagram fa-2x"></i></a>
          <a href="https://linkedin.com/in/alexbrooks" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn"><i class="fab fa-linkedin fa-2x"></i></a>
        </div>

        <p style="margin-top:1.25rem;font-size:.95rem;color:var(--labour-dark-red)">If you need to reach me urgently, email: <a href="mailto:hello@alexbrooks.london">hello@alexbrooks.london</a></p>
      </div>
    </div>
  </div>

</html>
